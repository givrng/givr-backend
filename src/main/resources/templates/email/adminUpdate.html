<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Project Completion Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            margin: auto;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .content {
            font-size: 14px;
            line-height: 1.6;
        }
        .highlight {
            font-weight: bold;
            color: #2c7be5;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #888;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 16px;
            background-color: #2c7be5;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        Project Completion Alert
    </div>

    <div class="content">
        <p>
            A project has been successfully completed by a volunteer.
        </p>

        <p>
            <span class="highlight">Volunteer Email:</span>
            <span th:text="${volunteerFullName}"></span>
        </p>
        <p>
            <span class="highlight">Volunteer Email:</span>
            <span th:text="${volunteerEmail}"></span>
        </p>

        <p>
            <span class="highlight">Project Name:</span>
            <span th:text="${projectName}">Project Title</span>
        </p>

        <p>
            <span class="highlight">Completion Date:</span>
            <span th:text="${completionDate}"></span>
        </p>

        <p>
            Please proceed with certificate processing for this volunteer.
        </p>

    </div>

    <div class="footer">
        This is an automated notification. Please do not reply.
    </div>
</div>
</body>
</html>
