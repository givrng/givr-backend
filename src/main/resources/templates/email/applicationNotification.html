<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table width="100%" cellpadding="0" cellspacing="0" style="padding:20px 0;">
    <tr>
        <td align="center">
            <table width="600" style="background:#FFFFFF; border-radius:8px;">
                <tr>
                    <td style="background:#16a34a; padding:24px; text-align:center;">
                        <h1 style="color:#FFFFFF; margin:0;">You have received a volunteer application</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px; color:#1F2937;">
                        <p>Hi <strong th:text="${organizationName}"></strong>,</p>
                        <p>
                            You have an applicant for the project below
                        </p>

                        <div style="background:#F6F9FC; padding:16px; border-left:4px solid #16a34a;">
                            <strong>Project: <span th:text="${projectName}"></span></strong><br>
                        </div>
                        <p style="margin-top:16px;">
                            Please review volunteer application
                        </p>
                        <p>— <strong>The Givr Nigeria Team</strong></p>
                    </td>
                </tr>
                <tr>
                    <td style="background:#F6F9FC; text-align:center; padding:16px; font-size:12px;"
                        th:text="|© ${#dates.year(#dates.createNow())} Givr Nigeria|"
                    >
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
